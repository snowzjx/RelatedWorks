<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3c"/>
      <stop offset="100%" style="stop-color:#1c1c1e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <linearGradient id="paper-mid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d8ef0"/>
      <stop offset="100%" style="stop-color:#1060d0"/>
    </linearGradient>
    <linearGradient id="paper-back" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#ffb300"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Paper stack (back) -->
  <rect x="264" y="162" width="495" height="700" rx="20" ry="20"
        fill="url(#paper-back)" opacity="0.75" transform="rotate(-18 512 512)"/>

  <!-- Paper stack (mid) -->
  <rect x="264" y="162" width="495" height="700" rx="20" ry="20"
        fill="url(#paper-mid)" opacity="0.8" transform="rotate(-8 512 512)"/>

  <!-- Paper (front) -->
  <rect x="264" y="162" width="495" height="700" rx="20" ry="20"
        fill="url(#paper)" opacity="0.9"/>

  <!-- RW title -->
  <text x="300" y="360" font-family="SF Pro Display, Helvetica Neue, Arial" font-weight="400"
        font-size="160" fill="#1c1c1e" text-anchor="start" letter-spacing="4">RW</text>

  <!-- Divider -->
  <rect x="300" y="392" width="423" height="3" rx="1" fill="#888888" opacity="0.7"/>

  <!-- Body lines -->
  <rect x="300" y="418" width="423" height="18" rx="5" fill="#555555" opacity="0.9"/>
  <rect x="300" y="450" width="340" height="18" rx="5" fill="#555555" opacity="0.9"/>
  <rect x="300" y="482" width="385" height="18" rx="5" fill="#555555" opacity="0.9"/>
  <rect x="300" y="514" width="300" height="18" rx="5" fill="#444444" opacity="0.7"/>
  <rect x="300" y="546" width="360" height="18" rx="5" fill="#444444" opacity="0.7"/>
  <rect x="300" y="578" width="280" height="18" rx="5" fill="#444444" opacity="0.7"/>
  <rect x="300" y="610" width="340" height="18" rx="5" fill="#444444" opacity="0.5"/>
  <rect x="300" y="642" width="260" height="18" rx="5" fill="#444444" opacity="0.5"/>
</svg>
