name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          VERSION=$( [[ "${GITHUB_REF_NAME}" == v* ]] && echo "${GITHUB_REF_NAME#v}" || echo "0.0.0" )
          xcodebuild \
            -project RelatedWorksApp.xcodeproj \
            -scheme RelatedWorksApp \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            MARKETING_VERSION="$VERSION" \
            CONFIGURATION_BUILD_DIR=build \
            build

      - name: Build TUI
        run: swift build -c release --product RelatedWorks

      - name: Remove quarantine & re-sign
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          codesign --force --deep --sign - build/RelatedWorks.app
          xattr -cr build/RelatedWorks.app
          codesign --force --sign - .build/release/RelatedWorks

      - name: Zip app
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp -r build/RelatedWorks.app release/
          cp .build/release/RelatedWorks release/relatedworks-tui
          zip -r RelatedWorks.zip release/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RelatedWorks.zip
