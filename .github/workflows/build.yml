name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/RelatedWorksApp.provisionprofile

      - name: Build (signed)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild \
            -project RelatedWorksApp.xcodeproj \
            -scheme RelatedWorksApp \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.MACOS_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="RelatedWorks" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            MARKETING_VERSION="$VERSION" \
            CONFIGURATION_BUILD_DIR=build \
            build

      - name: Build (unsigned, non-release)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          xcodebuild \
            -project RelatedWorksApp.xcodeproj \
            -scheme RelatedWorksApp \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            CONFIGURATION_BUILD_DIR=build \
            build

      - name: Build TUI
        run: swift build -c release --product RelatedWorks

      - name: Bundle and sign TUI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Wrap TUI in a minimal app bundle so it can hold a provisioning profile
          mkdir -p build/RelatedWorksTUI.bundle/Contents/MacOS
          cp .build/release/RelatedWorks build/RelatedWorksTUI.bundle/Contents/MacOS/RelatedWorks
          cat > build/RelatedWorksTUI.bundle/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleIdentifier</key><string>me.snowzjx.relatedworks</string>
            <key>CFBundleExecutable</key><string>RelatedWorks</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
          </dict></plist>
          EOF
          cp ~/Library/MobileDevice/Provisioning\ Profiles/RelatedWorksApp.provisionprofile \
            build/RelatedWorksTUI.bundle/Contents/embedded.provisionprofile
          codesign --force --options runtime --timestamp \
            --entitlements RelatedWorksApp/RelatedWorksTUI.entitlements \
            --sign "Developer ID Application" \
            build/RelatedWorksTUI.bundle

      - name: Notarize
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/RelatedWorks.app build/RelatedWorks-notarize.zip
          ditto -c -k --keepParent build/RelatedWorksTUI.bundle build/RelatedWorksTUI-notarize.zip
          for zip in build/RelatedWorks-notarize.zip build/RelatedWorksTUI-notarize.zip; do
            xcrun notarytool submit "$zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$MACOS_TEAM_ID" \
              --wait \
              --output-format json > notary_result.json
            cat notary_result.json
            SUBMISSION_ID=$(jq -r '.id' notary_result.json)
            STATUS=$(jq -r '.status' notary_result.json)
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$MACOS_TEAM_ID" || true
            if [ "$STATUS" != "Accepted" ]; then exit 1; fi
          done
          xcrun stapler staple build/RelatedWorks.app
          xcrun stapler staple build/RelatedWorksTUI.bundle

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp -r build/RelatedWorks.app release/
          cp build/RelatedWorksTUI.bundle/Contents/MacOS/RelatedWorks release/relatedworks-tui
          zip -r RelatedWorks.zip release/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RelatedWorks.zip

  build-ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS
        run: |
          VERSION=$( [[ "${GITHUB_REF_NAME}" == v* ]] && echo "${GITHUB_REF_NAME#v}" || echo "0.0.0" )
          xcodebuild \
            -project RelatedWorksApp.xcodeproj \
            -scheme RelatedWorksIOS \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            build
