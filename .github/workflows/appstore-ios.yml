name: App Store iOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.6.4)'
        required: true

permissions:
  contents: read

jobs:
  submit:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Import certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPSTORE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/appstore.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        env:
          APP_PROVISIONING_PROFILE: ${{ secrets.APPSTORE_IOS_PROVISIONING_PROFILE }}
          SHARE_EXTENSION_PROVISIONING_PROFILE: ${{ secrets.APPSTORE_IOS_SHARE_EXTENSION_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/RelatedWorksiOS.mobileprovision
          echo "$SHARE_EXTENSION_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/RelatedWorksShareExtension.mobileprovision

      - name: Apply CI signing overrides
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("RelatedWorksApp.xcodeproj/project.pbxproj")
          text = path.read_text()

          ios_release = """\
				CODE_SIGN_ENTITLEMENTS = RelatedWorksIOS/RelatedWorksIOS.AppStore.entitlements;
				CODE_SIGN_STYLE = Automatic;
				CURRENT_PROJECT_VERSION = 1;
				DEVELOPMENT_TEAM = A47Y4XPLXR;
				GENERATE_INFOPLIST_FILE = NO;
				INFOPLIST_FILE = Sources/RelatedWorksIOS/Info.plist;
				INFOPLIST_KEY_CFBundleDisplayName = RelatedWorks;
				INFOPLIST_KEY_LSApplicationCategoryType = "public.app-category.productivity";
				IPHONEOS_DEPLOYMENT_TARGET = 26.0;
				LD_RUNPATH_SEARCH_PATHS = (
					"$(inherited)",
					"@executable_path/Frameworks",
				);
				MARKETING_VERSION = 1.8.3;
				PRODUCT_BUNDLE_IDENTIFIER = me.snowzjx.relatedworks;
				PRODUCT_NAME = RelatedWorksIOS;
				SDKROOT = iphoneos;
				SWIFT_EMIT_LOC_STRINGS = YES;
				SWIFT_VERSION = 5.0;
				TARGETED_DEVICE_FAMILY = "1,2";
"""
          ios_release_ci = ios_release.replace(
              '				PRODUCT_NAME = RelatedWorksIOS;\n',
              '				PRODUCT_NAME = RelatedWorksIOS;\n				PROVISIONING_PROFILE_SPECIFIER = RelatedWorksiOS;\n'
          )

          share_release = """\
				APPLICATION_EXTENSION_API_ONLY = YES;
				CODE_SIGN_ENTITLEMENTS = RelatedWorksShareExtension/RelatedWorksShareExtension.entitlements;
				CODE_SIGN_STYLE = Automatic;
				CURRENT_PROJECT_VERSION = 1;
				DEVELOPMENT_TEAM = A47Y4XPLXR;
				GENERATE_INFOPLIST_FILE = NO;
				INFOPLIST_FILE = Sources/RelatedWorksShareExtension/Info.plist;
				IPHONEOS_DEPLOYMENT_TARGET = 26.0;
				LD_RUNPATH_SEARCH_PATHS = (
					"$(inherited)",
					"@executable_path/Frameworks",
					"@executable_path/../../Frameworks",
				);
				MARKETING_VERSION = 1.8.3;
				PRODUCT_BUNDLE_IDENTIFIER = me.snowzjx.relatedworks.ShareExtension;
				PRODUCT_NAME = RelatedWorksShareExtension;
				SDKROOT = iphoneos;
				SKIP_INSTALL = YES;
				SWIFT_EMIT_LOC_STRINGS = YES;
				SWIFT_OPTIMIZATION_LEVEL = "-O";
				SWIFT_VERSION = 5.0;
				TARGETED_DEVICE_FAMILY = "1,2";
"""
          share_release_ci = share_release.replace(
              '				PRODUCT_NAME = RelatedWorksShareExtension;\n',
              '				PRODUCT_NAME = RelatedWorksShareExtension;\n				PROVISIONING_PROFILE_SPECIFIER = RelatedWorksShareExtension;\n'
          )

          if ios_release not in text or share_release not in text:
              raise SystemExit("Expected Release signing blocks not found in project.pbxproj")

          text = text.replace(ios_release, ios_release_ci, 1)
          text = text.replace(share_release, share_release_ci, 1)
          path.write_text(text)
          PY

      - name: Archive
        run: |
          xcodebuild \
            -project RelatedWorksApp.xcodeproj \
            -scheme RelatedWorksIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.MACOS_TEAM_ID }} \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            MARKETING_VERSION="${{ github.event.inputs.version }}" \
            -archivePath /tmp/RelatedWorksIOS.xcarchive \
            archive

      - name: Export and Upload
        env:
          APPSTORE_API_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY_P8" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          cat > /tmp/ExportOptionsIOS.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.MACOS_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>me.snowzjx.relatedworks</key>
              <string>RelatedWorksiOS</string>
              <key>me.snowzjx.relatedworks.ShareExtension</key>
              <string>RelatedWorksShareExtension</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>destination</key>
            <string>upload</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath /tmp/RelatedWorksIOS.xcarchive \
            -exportPath /tmp/appstore_export_ios \
            -exportOptionsPlist /tmp/ExportOptionsIOS.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8 \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_API_ISSUER_ID"
